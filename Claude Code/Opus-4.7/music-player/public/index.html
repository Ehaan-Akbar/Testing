<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="player">
    <header class="now-playing">
      <div class="title" id="trackTitle">—</div>
      <div class="artist" id="trackArtist">Loading playlist…</div>
    </header>

    <section class="controls">
      <div class="seek-row">
        <span class="time" id="currentTime">0:00</span>
        <input type="range" id="seek" min="0" max="100" value="0" step="0.1" />
        <span class="time" id="duration">0:00</span>
      </div>

      <div class="buttons">
        <button id="prevBtn" title="Previous" aria-label="Previous">⏮</button>
        <button id="playBtn" class="primary" title="Play" aria-label="Play">▶</button>
        <button id="nextBtn" title="Next" aria-label="Next">⏭</button>
      </div>

      <div class="volume-row">
        <span class="icon">🔊</span>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" />
      </div>

      <div class="status" id="status"></div>
    </section>

    <section class="playlist">
      <h2>Playlist</h2>
      <ul id="playlistEl"></ul>
    </section>
  </main>

  <audio id="audio" preload="metadata"></audio>
  <script src="app.js"></script>
</body>
</html>
